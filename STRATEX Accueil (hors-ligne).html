document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

f2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* Brand */\n  --blue:   #2BA6E8;   /* Santé & Formation */\n  --green:  #7AC143;   /* Immobilier & Services */\n  --orange: #F2843C;   /* Performance & Finance */\n  --yellow: #F7B500;   /* accent ponctuel */\n\n  --blue-dk:   #1B7FB8;\n  --green-dk:  #5C9E2E;\n  --orange-dk: #D26A26;\n\n  /* Neutrals */\n  --ink:    #1C2530;\n  --ink-2:  #28323F;\n  --slate:  #5A6470;\n  --slate-2:#8A929D;\n  --line:   #E7ECF1;\n  --line-2: #D7DEE6;\n  --paper:  #FFFFFF;\n  --mist:   #F6F8FA;\n  --mist-2: #EEF2F6;\n\n  /* Tint washes */\n  --blue-wash:   #EAF6FE;\n  --green-wash:  #F0F8E9;\n  --orange-wash: #FDEFE4;\n  --yellow-wash: #FEF6E0;\n\n  /* Type */\n  --display: 'Plus Jakarta Sans', system-ui, sans-serif;\n  --body:    'Manrope', system-ui, sans-serif;\n\n  /* Radii */\n  --r-sm: 8px;\n  --r-md: 12px;\n  --r-lg: 18px;\n  --r-xl: 26px;\n\n  /* Shadow */\n  --sh-sm: 0 1px 2px rgba(28,37,48,.06), 0 2px 6px rgba(28,37,48,.05);\n  --sh-md: 0 2px 6px rgba(28,37,48,.06), 0 12px 28px rgba(28,37,48,.08);\n  --sh-lg: 0 8px 24px rgba(28,37,48,.10), 0 30px 60px rgba(28,37,48,.12);\n\n  /* Layout */\n  --maxw: 1200px;\n  --gutter: clamp(20px, 5vw, 64px);\n  --header-h: 76px;\n}\n\n* { box-sizing: border-box; }\n\nhtml { scroll-behavior: smooth; }\n\nbody {\n  margin: 0;\n  font-family: var(--body);\n  color: var(--ink);\n  background: var(--paper);\n  font-size: 17px;\n  line-height: 1.65;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nimg { max-width: 100%; display: block; }\na { color: inherit; text-decoration: none; }\n\nh1, h2, h3, h4 {\n  font-family: var(--display);\n  color: var(--ink);\n  margin: 0;\n  line-height: 1.12;\n  letter-spacing: -0.018em;\n  text-wrap: balance;\n}\n\np { margin: 0; text-wrap: pretty; }\n\n::selection { background: var(--blue); color: #fff; }\n\n/* ---------- Layout helpers ---------- */\n.wrap { width: 100%; max-width: var(--maxw); margin-inline: auto; padding-inline: var(--gutter); }\n.section { padding-block: clamp(64px, 9vw, 120px); }\n.section--tight { padding-block: clamp(48px, 6vw, 80px); }\n\n.eyebrow {\n  display: inline-flex; align-items: center; gap: 9px;\n  font-family: var(--display);\n  font-size: 12.5px; font-weight: 700; letter-spacing: .14em;\n  text-transform: uppercase; color: var(--slate);\n}\n.eyebrow .hex { width: 13px; height: 15px; }\n\n.lead { color: var(--slate); font-size: clamp(17px, 1.4vw, 19px); line-height: 1.7; }\n\n.section-head { max-width: 720px; margin-bottom: clamp(36px, 5vw, 56px); }\n.section-head h2 { font-size: clamp(30px, 4vw, 46px); font-weight: 800; margin-top: 14px; }\n.section-head p { margin-top: 18px; }\n\n/* ---------- Buttons ---------- */\n.btn {\n  --bg: var(--ink); --fg: #fff; --bd: var(--ink);\n  display: inline-flex; align-items: center; justify-content: center; gap: 10px;\n  font-family: var(--display); font-weight: 600; font-size: 15.5px;\n  min-height: 50px; padding: 0 26px; border-radius: 999px;\n  background: var(--bg); color: var(--fg); border: 1.5px solid var(--bd);\n  cursor: pointer; transition: transform .18s ease, box-shadow .2s ease, background .2s ease, color .2s ease, border-color .2s ease;\n  white-space: nowrap;\n}\n.btn:hover { transform: translateY(-2px); box-shadow: var(--sh-md); }\n.btn:active { transform: translateY(0); }\n.btn .arr { transition: transform .2s ease; }\n.btn:hover .arr { transform: translateX(4px); }\n\n.btn--primary { --bg: var(--blue); --bd: var(--blue); }\n.btn--primary:hover { --bg: var(--blue-dk); --bd: var(--blue-dk); }\n.btn--ink { --bg: var(--ink); --bd: var(--ink); }\n.btn--ink:hover { --bg: var(--ink-2); }\n.btn--ghost { --bg: transparent; --fg: var(--ink); --bd: var(--line-2); }\n.btn--ghost:hover { --bd: var(--ink); box-shadow: none; }\n.btn--light { --bg: #fff; --fg: var(--ink); --bd: #fff; }\n.btn--on-dark-ghost { --bg: transparent; --fg: #fff; --bd: rgba(255,255,255,.34); }\n.btn--on-dark-ghost:hover { --bd: #fff; box-shadow: none; }\n.btn--block { width: 100%; }\n\n.textlink {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-family: var(--display); font-weight: 600; font-size: 15px; color: var(--ink);\n}\n.textlink .arr { transition: transform .2s ease; }\n.textlink:hover .arr { transform: translateX(4px); }\n\n/* ---------- Hexagon primitives ---------- */\n.hex { display: inline-block; vertical-align: middle; }\n\n.hex-tile {\n  width: 56px; height: 64px;\n  display: grid; place-items: center;\n  -webkit-clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%);\n  clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%);\n  transition: transform .3s cubic-bezier(.22,1,.36,1);\n}\n.hex-tile svg { width: 46%; height: 46%; }\n\n/* micro-interactions */\n.fil-card:hover .fil-card__hex,\n.pole-card:hover .pole-card__icon,\n.course:hover .course__hex,\n.value:hover .value__hex { transform: rotate(-15deg) scale(1.06); }\n.brand:hover .brand__mark { transform: rotate(-12deg); transition: transform .35s cubic-bezier(.22,1,.36,1); }\n.brand__mark { transition: transform .35s cubic-bezier(.22,1,.36,1); }\n.nav a { position: relative; }\n.nav a::after { content: ''; position: absolute; left: 14px; right: 14px; bottom: 4px; height: 2px; background: var(--blue); transform: scaleX(0); transform-origin: left; transition: transform .25s ease; border-radius: 2px; }\n.nav a:hover::after, .nav a.is-active::after { transform: scaleX(1); }\n.nav a.is-active { background: transparent; }\n\n/* ====================================================================\n   HEADER\n   ==================================================================== */\n.site-header {\n  position: sticky; top: 0; z-index: 60;\n  background: rgba(255,255,255,.86);\n  backdrop-filter: saturate(140%) blur(14px);\n  border-bottom: 1px solid transparent;\n  transition: border-color .25s ease, box-shadow .25s ease, background .25s ease;\n}\n.site-header.is-scrolled { border-bottom-color: var(--line); box-shadow: 0 1px 0 rgba(28,37,48,.02), 0 8px 24px rgba(28,37,48,.05); }\n.header-inner {\n  height: var(--header-h);\n  display: flex; align-items: center; justify-content: space-between; gap: 24px;\n}\n\n.brand { display: inline-flex; align-items: center; gap: 12px; }\n.brand__mark { width: 42px; height: 42px; flex: none; }\n.brand__type { display: flex; flex-direction: column; line-height: 1; }\n.brand__name { font-family: var(--display); font-weight: 800; font-size: 19px; letter-spacing: .02em; color: var(--ink); }\n.brand__sub { font-family: var(--display); font-weight: 600; font-size: 9.5px; letter-spacing: .26em; color: var(--slate-2); text-transform: uppercase; margin-top: 3px; }\n\n.nav { display: flex; align-items: center; gap: 4px; }\n.nav a {\n  font-family: var(--display); font-weight: 600; font-size: 15px; color: var(--ink-2);\n  padding: 9px 14px; border-radius: 999px; transition: background .18s ease, color .18s ease;\n}\n.nav a:hover { background: var(--mist-2); }\n.nav a.is-active { color: var(--blue); }\n\n.header-actions { display: flex; align-items: center; gap: 14px; }\n\n.lang {\n  display: inline-flex; align-items: center; border: 1.5px solid var(--line-2);\n  border-radius: 999px; overflow: hidden; font-family: var(--display); font-weight: 700; font-size: 12.5px;\n}\n.lang button {\n  appearance: none; border: 0; background: transparent; cursor: pointer;\n  padding: 7px 11px; color: var(--slate); letter-spacing: .04em; transition: background .18s, color .18s;\n}\n.lang button.is-on { background: var(--ink); color: #fff; }\n\n.hamburger {\n  display: none; width: 46px; height: 46px; border: 1.5px solid var(--line-2);\n  background: #fff; border-radius: var(--r-sm); cursor: pointer; padding: 0;\n  align-items: center; justify-content: center;\n}\n.hamburger span { display: block; width: 20px; height: 2px; background: var(--ink); position: relative; transition: transform .25s, opacity .2s; }\n.hamburger span::before, .hamburger span::after { content: ''; position: absolute; left: 0; width: 20px; height: 2px; background: var(--ink); transition: transform .25s, top .25s; }\n.hamburger span::before { top: -6px; }\n.hamburger span::after  { top: 6px; }\nbody.menu-open .hamburger span { background: transparent; }\nbody.menu-open .hamburger span::before { top: 0; transform: rotate(45deg); }\nbody.menu-open .hamburger span::after  { top: 0; transform: rotate(-45deg); }\n\n/* mobile drawer */\n.mobile-nav {\n  position: fixed; inset: var(--header-h) 0 0 0; z-index: 55;\n  background: #fff; padding: 22px var(--gutter) 40px;\n  transform: translateY(-8px); opacity: 0; pointer-events: none;\n  transition: opacity .25s ease, transform .25s ease; overflow-y: auto;\n}\nbody.menu-open .mobile-nav { opacity: 1; transform: none; pointer-events: auto; }\n.mobile-nav a { display: block; font-family: var(--display); font-weight: 700; font-size: 22px; padding: 16px 0; border-bottom: 1px solid var(--line); color: var(--ink); }\n.mobile-nav .mobile-cta { margin-top: 26px; }\n.mobile-nav .lang { margin-top: 22px; }\n\n/* ====================================================================\n   HERO\n   ==================================================================== */\n.hero { position: relative; overflow: hidden; background: var(--paper); }\n.hero__grid {\n  display: grid; grid-template-columns: 1.05fr .95fr; gap: clamp(32px, 5vw, 72px);\n  align-items: center; padding-block: clamp(56px, 8vw, 104px);\n}\n.hero h1 { font-size: clamp(38px, 5.4vw, 66px); font-weight: 800; letter-spacing: -0.028em; }\n.hero h1 .accent { color: var(--blue); }\n.hero__slogan { margin-top: 24px; font-size: clamp(18px, 1.7vw, 21px); color: var(--slate); max-width: 30ch; line-height: 1.6; }\n.hero__cta { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 36px; }\n.hero__tag { margin-bottom: 22px; }\n\n/* hexagon composition */\n.hexcomp { position: relative; aspect-ratio: 1 / 1; max-width: 480px; margin-inline: auto; width: 100%; }\n.hexcomp svg { width: 100%; height: 100%; overflow: visible; }\n.hexcomp .hx-float-a { transform-box: fill-box; transform-origin: center; animation: hxFloatA 6.5s ease-in-out infinite; }\n.hexcomp .hx-pop { transform-box: fill-box; transform-origin: center; }\n.hexcomp .hx-float-b { transform-box: fill-box; transform-origin: center; animation: hxFloatB 7.5s ease-in-out infinite; }\n@keyframes hxFloatA { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-11px) rotate(8deg); } }\n@keyframes hxFloatB { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(9px) rotate(-7deg); } }\n@media (prefers-reduced-motion: reduce) {\n  .hexcomp .hx-float-a, .hexcomp .hx-float-b { animation: none; }\n}\n\n/* ====================================================================\n   PROOF BAND (dark)\n   ==================================================================== */\n.band-dark { background: var(--ink); color: #fff; position: relative; overflow: hidden; }\n.band-dark .eyebrow { color: rgba(255,255,255,.6); }\n.proof { display: grid; grid-template-columns: repeat(4, 1fr); }\n.proof__item { padding: clamp(28px,4vw,42px) clamp(18px,2.6vw,34px); border-left: 1px solid rgba(255,255,255,.12); }\n.proof__item:first-child { border-left: 0; padding-left: 0; }\n.proof__num { font-family: var(--display); font-weight: 800; font-size: clamp(34px, 4vw, 50px); letter-spacing: -.02em; line-height: 1; }\n.proof__num.u, .proof__num .u { color: var(--blue); }\n.proof__lbl { margin-top: 12px; color: rgba(255,255,255,.7); font-size: 15px; font-weight: 500; }\n\n/* ====================================================================\n   GROUPE intro (text + image)\n   ==================================================================== */\n.split { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(32px,5vw,72px); align-items: center; }\n.split--media-left { grid-template-columns: .95fr 1.05fr; }\n.prose p + p { margin-top: 18px; }\n.prose h2 { font-size: clamp(28px,3.4vw,42px); font-weight: 800; }\n\n/* placeholder media */\n.media {\n  position: relative; border-radius: var(--r-lg); overflow: hidden;\n  background: var(--mist-2); border: 1px solid var(--line);\n  display: grid; place-items: center; min-height: 320px; color: var(--slate-2);\n}\n.media__pattern { position: absolute; inset: 0; opacity: .5; }\n.media__label {\n  position: relative; font-family: var(--display); font-weight: 600; font-size: 13px;\n  letter-spacing: .03em; color: var(--slate); background: rgba(255,255,255,.78);\n  padding: 8px 14px; border-radius: 999px; border: 1px solid var(--line);\n}\n.media--tall { min-height: 440px; }\n.media--ratio { aspect-ratio: 4/3; min-height: 0; }\n\n/* ====================================================================\n   POLES (3 big cards)\n   ==================================================================== */\n.poles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }\n.pole-head { padding-top: 22px; }\n.pole-head__row { display: flex; align-items: center; gap: 20px; margin-bottom: 18px; }\n.pole-head__hex { width: 56px; height: 64px; flex: none; }\n.pole-head h2 { font-size: clamp(26px,3.2vw,40px); font-weight: 800; margin-top: 6px; }\n.pole-head .lead { max-width: 64ch; }\n.pole-card {\n  position: relative; background: #fff; border: 1px solid var(--line); border-radius: var(--r-lg);\n  padding: 34px 30px 30px; overflow: hidden; transition: transform .22s ease, box-shadow .22s ease, border-color .22s;\n  display: flex; flex-direction: column;\n}\n.pole-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--c); }\n.pole-card:hover { transform: translateY(-6px); box-shadow: var(--sh-lg); border-color: transparent; }\n.pole-card__icon { width: 58px; height: 66px; margin-bottom: 22px; }\n.pole-card__kicker { font-family: var(--display); font-weight: 700; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--ct, var(--c)); }\n.pole-card h3 { font-size: 25px; font-weight: 800; margin-top: 8px; }\n.pole-card p { margin-top: 14px; color: var(--slate); font-size: 15.5px; }\n.pole-card__foot { margin-top: auto; padding-top: 26px; display: flex; align-items: center; justify-content: space-between; }\n.pole-card__count { font-family: var(--display); font-weight: 700; font-size: 14px; color: var(--ink); }\n.pole-card__count span { color: var(--ct, var(--c)); }\n.pole-card .arr-link { display: inline-flex; width: 40px; height: 40px; align-items: center; justify-content: center; border-radius: 999px; background: var(--wash); color: var(--ct, var(--c)); transition: background .2s, transform .2s; }\n.pole-card:hover .arr-link { background: var(--c); color: #fff; transform: translateX(3px); }\n\n.pole-blue   { --c: var(--blue);   --ct: var(--blue-dk);   --wash: var(--blue-wash); }\n.pole-green  { --c: var(--green);  --ct: var(--green-dk);  --wash: var(--green-wash); }\n.pole-orange { --c: var(--orange); --ct: var(--orange-dk); --wash: var(--orange-wash); }\n.pole-yellow { --c: var(--yellow); --ct: #B07F00;          --wash: var(--yellow-wash); }\n\n/* ====================================================================\n   FILIALES grid\n   ==================================================================== */\n.fil-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }\n.fil-card {\n  display: flex; flex-direction: column; gap: 16px; background: #fff;\n  border: 1px solid var(--line); border-radius: var(--r-md); padding: 26px 24px;\n  transition: transform .2s ease, box-shadow .2s ease, border-color .2s;\n}\n.fil-card:hover { transform: translateY(-4px); box-shadow: var(--sh-md); border-color: var(--line-2); }\n.fil-card__hex { width: 46px; height: 52px; }\n.fil-card__name { font-family: var(--display); font-weight: 800; font-size: 18px; color: var(--ink); }\n.fil-card__sector { color: var(--slate); font-size: 14px; margin-top: 4px; }\n.fil-card__pole { margin-top: auto; display: inline-flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700; font-family: var(--display); letter-spacing: .04em; text-transform: uppercase; color: var(--ct, var(--c)); }\n.fil-card__pole .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--c); }\n\n/* ====================================================================\n   CTA band\n   ==================================================================== */\n.cta-band { background: var(--ink); color: #fff; border-radius: var(--r-xl); padding: clamp(40px,5.5vw,68px); position: relative; overflow: hidden; }\n.cta-band__inner { position: relative; display: flex; align-items: center; justify-content: space-between; gap: 32px; flex-wrap: wrap; }\n.cta-band h2 { color: #fff; font-size: clamp(26px,3.4vw,40px); font-weight: 800; max-width: 18ch; }\n.cta-band p { color: rgba(255,255,255,.66); margin-top: 14px; max-width: 46ch; }\n\n/* ====================================================================\n   FOOTER\n   ==================================================================== */\n.site-footer { background: var(--ink); color: rgba(255,255,255,.72); }\n.footer-top { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1.3fr; gap: 40px; padding-block: clamp(54px,7vw,80px); }\n.footer-brand .brand__name { color: #fff; }\n.footer-brand .brand__sub { color: rgba(255,255,255,.5); }\n.footer-brand p { margin-top: 20px; max-width: 30ch; font-size: 14.5px; color: rgba(255,255,255,.6); }\n.footer-col h4 { font-family: var(--display); font-size: 13px; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.5); font-weight: 700; margin-bottom: 18px; }\n.footer-col ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 11px; }\n.footer-col a { font-size: 14.5px; color: rgba(255,255,255,.74); transition: color .18s; }\n.footer-col a:hover { color: #fff; }\n.footer-contact li { display: flex; gap: 11px; font-size: 14.5px; margin-bottom: 14px; align-items: flex-start; }\n.footer-contact .ic { color: var(--blue); flex: none; margin-top: 2px; }\n.footer-bottom { border-top: 1px solid rgba(255,255,255,.1); padding-block: 24px; display: flex; align-items: center; justify-content: space-between; gap: 18px; flex-wrap: wrap; font-size: 13.5px; color: rgba(255,255,255,.5); }\n.footer-bottom .socials { display: flex; gap: 10px; }\n.footer-bottom .socials a { width: 36px; height: 36px; display: grid; place-items: center; border-radius: 999px; border: 1px solid rgba(255,255,255,.16); transition: background .2s, border-color .2s; }\n.footer-bottom .socials a:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.3); }\n\n/* ====================================================================\n   PAGE HERO (interior pages)\n   ==================================================================== */\n.page-hero { background: var(--mist); border-bottom: 1px solid var(--line); position: relative; overflow: hidden; }\n.page-hero__inner { padding-block: clamp(48px, 6vw, 88px); position: relative; max-width: 760px; }\n.page-hero h1 { font-size: clamp(34px,4.6vw,56px); font-weight: 800; margin-top: 16px; }\n.page-hero p { margin-top: 20px; }\n.crumbs { display: flex; align-items: center; gap: 8px; font-family: var(--display); font-size: 13px; font-weight: 600; color: var(--slate); }\n.crumbs a:hover { color: var(--ink); }\n.crumbs .sep { color: var(--line-2); }\n\n/* Value cards */\n.values { display: grid; grid-template-columns: repeat(3,1fr); gap: 22px; }\n.value {\n  background: #fff; border: 1px solid var(--line); border-radius: var(--r-md); padding: 30px 28px;\n}\n.value__hex { width: 44px; height: 50px; margin-bottom: 18px; }\n.value h3 { font-size: 20px; font-weight: 700; }\n.value p { margin-top: 12px; color: var(--slate); font-size: 15px; }\n\n/* ====================================================================\n   FILIALE page specifics\n   ==================================================================== */\n.fil-hero { position: relative; border-bottom: 1px solid var(--line); overflow: hidden; --c: var(--blue); --wash: var(--blue-wash); }\n.fil-hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: var(--c); }\n.fil-hero__inner { padding-block: clamp(48px,6vw,92px); display: grid; grid-template-columns: 1.1fr .9fr; gap: clamp(32px,5vw,64px); align-items: center; }\n.fil-badge { display: inline-flex; align-items: center; gap: 10px; padding: 7px 14px 7px 8px; border-radius: 999px; background: var(--wash); color: var(--ct, var(--c)); font-family: var(--display); font-weight: 700; font-size: 13px; }\n.fil-badge .hex-tile { width: 28px; height: 32px; }\n.fil-hero h1 { font-size: clamp(34px,4.6vw,56px); font-weight: 800; margin-top: 22px; }\n.fil-hero__slogan { margin-top: 20px; font-size: clamp(18px,1.8vw,22px); font-style: italic; color: var(--ct, var(--c)); font-family: var(--display); font-weight: 500; }\n.fil-hero__desc { margin-top: 22px; max-width: 52ch; }\n\n.axes { display: grid; grid-template-columns: repeat(3,1fr); gap: 22px; }\n.axis {\n  background: #fff; border: 1px solid var(--line); border-radius: var(--r-md); padding: 28px 26px;\n  position: relative; transition: transform .2s, box-shadow .2s;\n}\n.axis:hover { transform: translateY(-4px); box-shadow: var(--sh-md); }\n.axis__n { font-family: var(--display); font-weight: 800; font-size: 14px; color: var(--ct, var(--c)); letter-spacing: .04em; }\n.axis h3 { font-size: 19px; font-weight: 700; margin-top: 14px; }\n.axis p { margin-top: 10px; color: var(--slate); font-size: 14.5px; }\n\n.fil-nav { display: flex; flex-wrap: wrap; gap: 10px; }\n.fil-chip {\n  display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: 999px;\n  border: 1.5px solid var(--line); font-family: var(--display); font-weight: 600; font-size: 14px; color: var(--slate);\n  transition: border-color .2s, color .2s, background .2s;\n}\n.fil-chip:hover { color: var(--ink); border-color: var(--line-2); }\n.fil-chip.is-active { background: var(--ink); color: #fff; border-color: var(--ink); }\n.fil-chip .dot { width: 8px; height: 8px; border-radius: 999px; }\n\n/* ====================================================================\n   ACADEMY\n   ==================================================================== */\n.cursus { display: grid; grid-template-columns: repeat(2,1fr); gap: 22px; }\n.course { display: flex; gap: 22px; background: #fff; border: 1px solid var(--line); border-radius: var(--r-md); padding: 28px; transition: transform .2s, box-shadow .2s; }\n.course:hover { transform: translateY(-4px); box-shadow: var(--sh-md); }\n.course__hex { width: 52px; height: 60px; flex: none; }\n.course h3 { font-size: 20px; font-weight: 700; }\n.course__tag { display: inline-block; margin-top: 10px; font-family: var(--display); font-weight: 700; font-size: 12px; letter-spacing: .06em; text-transform: uppercase; color: var(--blue); }\n.course p { margin-top: 12px; color: var(--slate); font-size: 15px; }\n\n/* ====================================================================\n   CONTACT\n   ==================================================================== */\n.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(32px,5vw,64px); align-items: start; }\n.field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }\n.field label { font-family: var(--display); font-weight: 600; font-size: 14px; color: var(--ink); }\n.field input, .field textarea, .field select {\n  font-family: var(--body); font-size: 16px; color: var(--ink);\n  padding: 14px 16px; border: 1.5px solid var(--line-2); border-radius: var(--r-sm); background: #fff;\n  transition: border-color .18s, box-shadow .18s; width: 100%;\n}\n.field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-wash); }\n.field textarea { resize: vertical; min-height: 130px; }\n.field--row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }\n.contact-info { background: var(--ink); color: #fff; border-radius: var(--r-lg); padding: clamp(32px,4vw,46px); }\n.contact-info h3 { color: #fff; font-size: 24px; font-weight: 700; }\n.contact-info .ci-list { list-style: none; padding: 0; margin: 26px 0 0; display: flex; flex-direction: column; gap: 22px; }\n.contact-info .ci-list li { display: flex; gap: 14px; align-items: flex-start; }\n.contact-info .ci-ic { width: 42px; height: 42px; flex: none; border-radius: 999px; background: rgba(255,255,255,.08); display: grid; place-items: center; color: var(--blue); }\n.contact-info .ci-k { font-family: var(--display); font-weight: 700; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: rgba(255,255,255,.5); }\n.contact-info .ci-v { color: #fff; font-size: 15.5px; margin-top: 3px; line-height: 1.5; }\n.map-ph { margin-top: 26px; border-radius: var(--r-md); overflow: hidden; aspect-ratio: 16/9; background: var(--ink-2); display: grid; place-items: center; position: relative; border: 1px solid rgba(255,255,255,.1); }\n\n/* ====================================================================\n   Scroll reveal\n   ==================================================================== */\n.reveal { opacity: 1; transform: translateY(22px); transition: transform .7s cubic-bezier(.2,.7,.2,1); will-change: transform; }\n.reveal.in { transform: none; }\n.reveal[data-d=\"1\"] { transition-delay: .07s; }\n.reveal[data-d=\"2\"] { transition-delay: .14s; }\n.reveal[data-d=\"3\"] { transition-delay: .21s; }\n.reveal[data-d=\"4\"] { transition-delay: .28s; }\n@media (prefers-reduced-motion: reduce) { .reveal { transform: none; transition: none; } }\n\n/* ====================================================================\n   RESPONSIVE\n   ==================================================================== */\n@media (max-width: 1080px) {\n  .footer-top { grid-template-columns: 1fr 1fr; gap: 36px; }\n  .fil-grid { grid-template-columns: repeat(2, 1fr); }\n}\n@media (max-width: 960px) {\n  .nav, .header-actions .desktop-only { display: none; }\n  .hamburger { display: inline-flex; }\n  .hero__grid { grid-template-columns: 1fr; }\n  .hexcomp { max-width: 380px; grid-row: 1; }\n  .hero__media-wrap { order: -1; }\n  .split, .split--media-left, .contact-grid, .fil-hero__inner { grid-template-columns: 1fr; }\n  .poles { grid-template-columns: 1fr; }\n  .proof { grid-template-columns: repeat(2, 1fr); }\n  .proof__item { border-left: 0; padding-left: 0 !important; border-top: 1px solid rgba(255,255,255,.12); }\n  .proof__item:first-child, .proof__item:nth-child(2) { border-top: 0; }\n  .values, .axes, .cursus { grid-template-columns: 1fr; }\n  .media--tall { min-height: 320px; }\n}\n@media (max-width: 560px) {\n  body { font-size: 16px; }\n  .fil-grid { grid-template-columns: 1fr; }\n  .footer-top { grid-template-columns: 1fr; }\n  .footer-bottom { flex-direction: column; align-items: flex-start; }\n  .field--row { grid-template-columns: 1fr; }\n  .btn { width: 100%; }\n  .hero__cta .btn { width: 100%; }\n  .cta-band__inner .btn { width: 100%; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"header-slot\"><\u002Fdiv>\n\n<main>\n  <!-- ============ HERO ============ -->\n  <section class=\"hero\">\n    <div class=\"wrap hero__grid\">\n      <div class=\"hero__copy\">\n        <span class=\"eyebrow hero__tag reveal\" data-i18n=\"home.hero.tag\">Groupe multisectoriel · Cotonou, Bénin<\u002Fspan>\n        <h1 class=\"reveal\" data-d=\"1\" data-i18n-html=\"home.hero.title\">L'innovation qui relie les secteurs, pour bâtir l'avenir.<\u002Fh1>\n        <p class=\"hero__slogan reveal\" data-d=\"2\" data-i18n=\"home.hero.sub\">Un écosystème global de services de haute qualité, structuré en filiales spécialisées — pour les institutions, les partenaires et les particuliers.<\u002Fp>\n        <div class=\"hero__cta reveal\" data-d=\"3\">\n          <a class=\"btn btn--primary\" href=\"le-groupe.html\"><span data-i18n=\"home.hero.cta1\">Découvrir le groupe<\u002Fspan><\u002Fa>\n          <a class=\"btn btn--ghost\" href=\"#filiales\"><span data-i18n=\"home.hero.cta2\">Nos filiales<\u002Fspan><\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hero__media-wrap reveal\" data-d=\"2\">\n        <div class=\"hexcomp\" id=\"hexcomp\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PROOF BAND ============ -->\n  <section class=\"band-dark\">\n    <div class=\"wrap\">\n      <div class=\"proof\">\n        <div class=\"proof__item reveal\"><div class=\"proof__num u\" data-count=\"3\">3<\u002Fdiv><div class=\"proof__lbl\" data-i18n=\"home.proof.p1\">Pôles stratégiques<\u002Fdiv><\u002Fdiv>\n        <div class=\"proof__item reveal\" data-d=\"1\"><div class=\"proof__num\" data-count=\"7\">7<\u002Fdiv><div class=\"proof__lbl\" data-i18n=\"home.proof.p2\">Filiales spécialisées<\u002Fdiv><\u002Fdiv>\n        <div class=\"proof__item reveal\" data-d=\"2\"><div class=\"proof__num\" data-count=\"1\">1<\u002Fdiv><div class=\"proof__lbl\" data-i18n=\"home.proof.p3\">Interlocuteur unique<\u002Fdiv><\u002Fdiv>\n        <div class=\"proof__item reveal\" data-d=\"3\"><div class=\"proof__num u\">∞<\u002Fdiv><div class=\"proof__lbl\" data-i18n=\"home.proof.p4\">Normes internationales<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ GROUPE INTRO ============ -->\n  <section class=\"section\">\n    <div class=\"wrap split split--media-left\">\n      <div class=\"reveal\">\n        <div class=\"media media--tall\">\n          <div class=\"media__pattern\" id=\"grpPattern\"><\u002Fdiv>\n          <span class=\"media__label\" data-i18n=\"home.group.medialbl\">Image — Le Groupe<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"prose reveal\" data-d=\"1\">\n        <span class=\"eyebrow\">__HEX__<span data-i18n=\"home.group.eyebrow\">Le Groupe<\u002Fspan><\u002Fspan>\n        <h2 style=\"margin-top:14px\" data-i18n=\"home.group.title\">Un partenaire de confiance, un écosystème centralisé.<\u002Fh2>\n        <p style=\"margin-top:20px\" class=\"lead\" data-i18n=\"home.group.p1\">STRATEX GROUP INTERNATIONAL est une structure multisectorielle née de la volonté d'offrir un écosystème global de services de haute qualité, structurée en filiales spécialisées.<\u002Fp>\n        <p style=\"margin-top:16px\" data-i18n=\"home.group.p2\">Notre positionnement d'interlocuteur unique et centralisé garantit la synergie entre rigueur scientifique des pôles médicaux, flexibilité logistique et sécurité des solutions financières et immobilières.<\u002Fp>\n        <div style=\"margin-top:30px\">\n          <a class=\"btn btn--ink\" href=\"le-groupe.html\"><span data-i18n=\"home.group.cta\">En savoir plus<\u002Fspan><\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ POLES ============ -->\n  <section class=\"section\" style=\"background:var(--mist); border-block:1px solid var(--line)\">\n    <div class=\"wrap\">\n      <div class=\"section-head reveal\">\n        <span class=\"eyebrow\">__HEX__<span data-i18n=\"home.poles.eyebrow\">Nos 3 pôles d'activité<\u002Fspan><\u002Fspan>\n        <h2 data-i18n=\"home.poles.title\">Trois pôles, une seule exigence de qualité.<\u002Fh2>\n        <p class=\"lead\" data-i18n=\"home.poles.sub\">Chaque pôle réunit des filiales spécialisées, pilotées avec la même rigueur technique héritée de nos divisions Pharma et Médical.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"poles\">\n        <a class=\"pole-card pole-blue reveal\" href=\"nos-poles.html#sante\">\n          <div class=\"pole-card__icon hex-tile\" style=\"background:var(--blue-wash)\">__HEXICON_blue__<\u002Fdiv>\n          <span class=\"pole-card__kicker\" data-i18n=\"pole.blue.kicker\">Pôle 1<\u002Fspan>\n          <h3 data-i18n=\"pole.blue.name\">Santé &amp; Formation<\u002Fh3>\n          <p data-i18n=\"pole.blue.desc\">De la représentation pharmaceutique à l'import de consommables et la formation certifiante — l'exigence scientifique au service de la santé.<\u002Fp>\n          <div class=\"pole-card__foot\">\n            <span class=\"pole-card__count\"><span>3<\u002Fspan> <span data-i18n=\"pole.count\">filiales<\u002Fspan><\u002Fspan>\n            <span class=\"arr-link\">__ARR__<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n        <a class=\"pole-card pole-green reveal\" data-d=\"1\" href=\"nos-poles.html#immobilier\">\n          <div class=\"pole-card__icon hex-tile\" style=\"background:var(--green-wash)\">__HEXICON_green__<\u002Fdiv>\n          <span class=\"pole-card__kicker\" data-i18n=\"pole.green.kicker\">Pôle 2<\u002Fspan>\n          <h3 data-i18n=\"pole.green.name\">Immobilier &amp; Services<\u002Fh3>\n          <p data-i18n=\"pole.green.desc\">Gestion, promotion et construction immobilière, entretien professionnel et logistique — bâtir et entretenir des espaces de confiance.<\u002Fp>\n          <div class=\"pole-card__foot\">\n            <span class=\"pole-card__count\"><span>2<\u002Fspan> <span data-i18n=\"pole.count\">filiales<\u002Fspan><\u002Fspan>\n            <span class=\"arr-link\">__ARR__<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n        <a class=\"pole-card pole-orange reveal\" data-d=\"2\" href=\"nos-poles.html#performance\">\n          <div class=\"pole-card__icon hex-tile\" style=\"background:var(--orange-wash)\">__HEXICON_orange__<\u002Fdiv>\n          <span class=\"pole-card__kicker\" data-i18n=\"pole.orange.kicker\">Pôle 3<\u002Fspan>\n          <h3 data-i18n=\"pole.orange.name\">Performance &amp; Finance<\u002Fh3>\n          <p data-i18n=\"pole.orange.desc\">Fournitures et équipements de bureau, transactions et opérations de change sécurisées — la performance de votre espace de travail.<\u002Fp>\n          <div class=\"pole-card__foot\">\n            <span class=\"pole-card__count\"><span>2<\u002Fspan> <span data-i18n=\"pole.count\">filiales<\u002Fspan><\u002Fspan>\n            <span class=\"arr-link\">__ARR__<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FILIALES GRID ============ -->\n  <section class=\"section\" id=\"filiales\">\n    <div class=\"wrap\">\n      <div class=\"section-head reveal\">\n        <span class=\"eyebrow\">__HEX__<span data-i18n=\"home.subs.eyebrow\">Toutes nos filiales<\u002Fspan><\u002Fspan>\n        <h2 data-i18n=\"home.subs.title\">Sept expertises, un seul interlocuteur.<\u002Fh2>\n        <p class=\"lead\" data-i18n=\"home.subs.sub\">Sélectionnez une filiale pour découvrir ses axes d'intervention.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"fil-grid\" id=\"filGrid\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CTA BAND ============ -->\n  <section class=\"section--tight\">\n    <div class=\"wrap\">\n      <div class=\"cta-band reveal\">\n        <div class=\"cta-band__bg\" id=\"ctaBg\"><\u002Fdiv>\n        <div class=\"cta-band__inner\">\n          <div>\n            <h2 data-i18n=\"home.cta.title\">Un seul interlocuteur pour tous vos besoins.<\u002Fh2>\n            <p data-i18n=\"home.cta.sub\">Centralisez vos besoins stratégiques auprès d'un partenaire de confiance : réduction des coûts de gestion, traçabilité et réactivité opérationnelle.<\u002Fp>\n          <\u002Fdiv>\n          <a class=\"btn btn--light\" href=\"contact.html\"><span data-i18n=\"home.cta.btn\">Demander un rendez-vous<\u002Fspan>__ARR__<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n\n<div id=\"footer-slot\"><\u002Fdiv>\n\n<script src=\"6aa15f26-8040-43f8-8342-8806cd1526ed\"><\u002Fscript>\n<script src=\"2f06f8fc-331e-44d1-826e-549ef61b647b\"><\u002Fscript>\n<script>\n  (function () {\n    // sector labels (registered into the dictionary)\n    var sectors = {\n      'stratex-pharma':     { fr: 'Représentation pharmaceutique', en: 'Pharmaceutical representation' },\n      'stratex-medical':    { fr: 'Consommables médicaux',         en: 'Medical supplies' },\n      'stratex-academy':    { fr: 'Formation & coaching',          en: 'Training & coaching' },\n      'stratex-immobilier': { fr: 'Immobilier & construction',     en: 'Real estate & construction' },\n      'stratex-service':    { fr: 'Entretien & logistique',        en: 'Maintenance & logistics' },\n      'stratex-bureautique':{ fr: 'Fournitures de bureau',         en: 'Office supplies' },\n      'stratex-finance':    { fr: 'Transactions & change',         en: 'Transactions & exchange' }\n    };\n    Object.keys(sectors).forEach(function (k) { window.STRATEX_I18N['sector.' + k] = sectors[k]; });\n\n    // hero composition + decorative patterns\n    document.getElementById('hexcomp').innerHTML = STRATEX.heroComposition();\n    // safe one-shot entrance (base state stays visible if animation engine is throttled)\n    if (!matchMedia('(prefers-reduced-motion: reduce)').matches && document.querySelector('#hexcomp .hx-pop') && document.querySelector('#hexcomp .hx-pop').animate) {\n      document.querySelectorAll('#hexcomp .hx-pop').forEach(function (el, i) {\n        var d = parseInt(el.style.getPropertyValue('--i'), 10); if (isNaN(d)) d = i;\n        el.animate([{ transform: 'scale(.62)' }, { transform: 'scale(1)' }],\n          { duration: 560, delay: 90 * d + 120, easing: 'cubic-bezier(.34,1.4,.5,1)' });\n      });\n    }\n    var gp = document.getElementById('grpPattern');\n    if (gp) { gp.style.backgroundImage = STRATEX.honeycomb('#1C2530', 0.10); gp.style.backgroundColor = '#EEF2F6'; }\n    var cb = document.getElementById('ctaBg');\n    if (cb) cb.style.cssText = 'position:absolute;inset:0;opacity:.5;background-image:' + STRATEX.honeycomb('#FFFFFF', 0.05);\n\n    // eyebrow hex bullets\n    document.querySelectorAll('.eyebrow').forEach(function (e) {\n      e.innerHTML = e.innerHTML.replace('__HEX__', STRATEX.hexIcon('var(--blue)'));\n    });\n\n    // token substitution for arrows + pole icons\n    function sub(html) {\n      return html.replace(/__ARR__/g, STRATEX.arrow)\n        .replace('__HEXICON_blue__', STRATEX.hexIcon('var(--blue)'))\n        .replace('__HEXICON_green__', STRATEX.hexIcon('var(--green)'))\n        .replace('__HEXICON_orange__', STRATEX.hexIcon('var(--orange)'));\n    }\n    document.querySelectorAll('.arr-link, .pole-card__icon, .btn').forEach(function (el) {\n      if (/__ARR__|__HEXICON/.test(el.innerHTML)) el.innerHTML = sub(el.innerHTML);\n    });\n\n    // filiale grid (per-subsidiary brand colors)\n    document.getElementById('filGrid').innerHTML = STRATEX.filiales.map(function (f) {\n      return STRATEX.filCard(f, '');\n    }).join('');\n\n    STRATEX.mount({ active: 'home' });\n\n    // observe injected reveals\n    var io = new IntersectionObserver(function (es) {\n      es.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });\n    }, { threshold: 0.12 });\n    document.querySelectorAll('#filGrid .reveal').forEach(function (el) { io.observe(el); });\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
